name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Build binary
        working-directory: packages/opencode
        run: bun run build --single
        env:
          KILO_RELEASE: "1"
          KILO_VERSION: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive binary
        working-directory: packages/opencode
        run: |
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            cd dist/@kilocode/cli-${{ matrix.target }}/bin
            tar -czf ../../kilo-${{ matrix.target }}.tar.gz kilo
          else
            cd dist/@kilocode/cli-${{ matrix.target }}/bin
            zip ../../kilo-${{ matrix.target }}.zip kilo
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kilo-${{ matrix.target }}
          path: packages/opencode/dist/kilo-${{ matrix.target }}.*
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
