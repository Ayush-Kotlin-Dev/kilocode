name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Build binary
        working-directory: packages/opencode
        run: bun run build --single
        env:
          KILO_VERSION: ${{ github.ref_name }}

      - name: Archive and upload
        working-directory: packages/opencode
        run: |
          mkdir -p out
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            cp dist/@kilocode/cli-${{ matrix.target }}/bin/kilo out/kilo
            tar -czf out/kilo-${{ matrix.target }}.tar.gz -C out kilo
          else
            cp dist/@kilocode/cli-${{ matrix.target }}/bin/kilo out/kilo
            cd out
            zip kilo-${{ matrix.target }}.zip kilo
            cd ..
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kilo-${{ matrix.target }}
          path: |
            packages/opencode/out/kilo-${{ matrix.target }}.tar.gz
            packages/opencode/out/kilo-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
